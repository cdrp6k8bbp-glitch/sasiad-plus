name: Quality checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BETTER_AUTH_SECRET: ci-only-placeholder-secret-with-more-than-32-characters
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check code style
        run: npm run lint

      - name: Check TypeScript
        run: npm run typecheck

      - name: Test all D1 migrations on a fresh database
        run: npm run db:migrations:smoke

      - name: Build application
        run: npm run build
